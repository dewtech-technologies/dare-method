site_name: DARE Method
site_description: AI-assisted development methodology with CLI, Skills, and Rails 8 stack
site_url: https://docs.dare.dewtech.tech
repo_url: https://github.com/dewtech-technologies/dare-method
repo_name: dewtech/dare-method
edit_uri: edit/main/packages/docs/docs/

copyright: Copyright &copy; 2026 Dewtech Technologies — MIT License

theme:
  name: material
  language: pt
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - announce.dismiss

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: [pt, en]
  - i18n:
      default_language: pt
      languages:
        pt:
          name: Português
          build: true
        en:
          name: English
          build: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Primeiros Passos:
    - getting-started/index.md
    - Instalação: getting-started/installation.md
    - Primeiro Projeto: getting-started/first-project.md
    - Conceitos: getting-started/concepts.md
  - Skills:
    - skills/index.md
    - dare-ax: skills/dare-ax.md
    - dare-layered-design: skills/dare-layered-design.md
    - dare-llm-integration: skills/dare-llm-integration.md
    - dare-frontend-design: skills/dare-frontend-design.md
    - dare-realtime: skills/dare-realtime.md
    - dare-quality-telemetry: skills/dare-quality-telemetry.md
  - Stacks:
    - Ruby on Rails 8: stacks/ruby-rails-8.md
  - CLI:
    - cli/index.md
    - dare skill add: cli/skill-add.md
    - dare skill list: cli/skill-list.md
    - dare skill publish: cli/skill-publish.md
    - Skill Registry: cli/skill-registry.md
  - Contribuindo:
    - contributing/index.md
    - Publicar uma Skill: contributing/publish-a-skill.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dewtech-technologies/dare-method
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:wleandro.oliveira@gmail.com
      name: Contato
  analytics:
    provider: custom
