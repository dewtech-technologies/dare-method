# gitleaks config — scans templates/stacks/** for accidental real secrets.
# DARE templates intentionally ship placeholder env values; the allowlist below
# keeps those from being flagged while still catching real key material.

title = "DARE Method gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Placeholders used in DARE templates + design docs"
regexTarget = "match"
regexes = [
  '''replace-me''',
  '''replace-me-in-prod''',
  '''your-.*-here''',
  '''<TIMESTAMP>''',
  '''<UUID>''',
  '''<RAILS_SECRET>''',
  '''<RAILS_HEX64>''',
  '''postgresql://user:pass@''',
  '''postgres://user:pass@''',
  '''Admin0Pass''',
  '''Str0ngPass''',
]
paths = [
  # Design/blueprint/spec docs legitimately show example secrets in prose.
  '''^DARE/''',
  # Parity fixture stores sha256 hashes (64-hex) of generated files — not secrets.
  '''parity-rails\.fixture\.json$''',
]

# Targeted high-signal rules over the template tree.
[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-[A-Za-z0-9]{40,}'''
path = '''packages/cli/templates/'''

[[rules]]
id = "aws-access-key"
description = "AWS access key id"
regex = '''AKIA[0-9A-Z]{16}'''
path = '''packages/cli/templates/'''

[[rules]]
id = "generic-assigned-secret"
description = "secret/token/password assigned a long opaque value"
regex = '''(?i)(secret|token|password|api[_-]?key|jwt)\s*[:=]\s*['"]?([A-Za-z0-9+/]{40,}={0,2})['"]?'''
path = '''packages/cli/templates/'''
