name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish @dewtech/dare-cli to npm
    runs-on: ubuntu-latest

    permissions:
      contents: write # criar o GitHub Release
      id-token: write # gerar provenance (supply-chain attestation)

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0

      - name: Setup Node.js for publish
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test

      - name: Skip if version already published
        id: guard
        working-directory: packages/cli
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::warning::${NAME}@${VERSION} já está publicado — pulando npm publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      # Configure trusted publisher @dewtech/dare-cli ↔ this GitHub repo on npmjs.com
      # before the first v3.4.0 release (OIDC can replace NPM_TOKEN when active).
      - name: Publish to npm with provenance
        if: steps.guard.outputs.already == 'false'
        working-directory: packages/cli
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Resolving release notes for v${VERSION}"
          NOTES="$(node scripts/extract-release-notes.mjs "${VERSION}")"
          {
            echo "body<<__DARE_NOTES_EOF__"
            printf '%s\n' "${NOTES}"
            echo "__DARE_NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a6c7483a42ee9d5daced968f6c217562cd680f7f # v2.0.0
        with:
          body: ${{ steps.notes.outputs.body }}
          token: ${{ secrets.GITHUB_TOKEN }}
