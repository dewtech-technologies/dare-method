name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version and create tag
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in all packages
        id: bump
        run: |
          # Get current version from root cli package
          CURRENT=$(node -p "require('./packages/cli/package.json').version")
          echo "Current version: $CURRENT"

          # Calculate new version
          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}

          if [ "${{ github.event.inputs.version }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.version }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update all package.json files
          for PKG in packages/cli packages/core packages/graphrag packages/mcp-server; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$PKG/package.json', 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('$PKG/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Updated $PKG to $NEW_VERSION"
          done

      - name: Build and test
        run: |
          pnpm -r build
          pnpm -r test

      - name: Commit version bump
        run: |
          git add packages/*/package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"
