name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version and create tag
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in all packages
        id: bump
        run: |
          # Get current version from root cli package
          CURRENT=$(node -p "require('./packages/cli/package.json').version")
          echo "Current version: $CURRENT"

          # Calculate new version
          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}

          if [ "${{ github.event.inputs.version }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.version }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update CLI package.json (single consolidated package)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated packages/cli to $NEW_VERSION"

          # Update root package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build and test
        run: |
          pnpm -r build
          pnpm -r test

      - name: DARE bench regression gate (RF-08)
        run: |
          cd packages/cli
          pnpm build
          node dist/bin/dare.js bench \
            --suite fixtures/bench \
            --json \
            --baseline fixtures/bench/bench-baseline.json \
            --fail-on-regression 3 \
            > ../../bench-report.json
        continue-on-error: false

      - name: Upload bench report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: bench-report
          path: bench-report.json

      - name: Commit version bump
        run: |
          git add package.json packages/cli/package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"
