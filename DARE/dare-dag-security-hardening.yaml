    subtask_prompt: |
      Estender packages/cli/src/utils/path-safety.ts (BLUEPRINT §3.1):
      - Manter assertRelativeSafe existente (sem regressão).
      - export class PathEscapeError extends Error { readonly code = 'PATH_ESCAPE' }
      - export function assertWithinRoot(root: string, resolved: string): void
