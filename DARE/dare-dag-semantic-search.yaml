    depends_on: [task-801]
    complexity: MED
    spec_file: EXECUTION/task-802-hybrid-rrf.md
    subtask_prompt: |
      Criar packages/cli/src/graphrag/hybrid.ts (BLUEPRINT §3.3). hybridSearch(graph, embedder: Embedder|null,
      query, opts): Promise<SearchResult[]>. Funde keyword (LIKE — searchNodes atual) + vetor (cosineTopK) +
