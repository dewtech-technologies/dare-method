    depends_on: []
    complexity: LOW
    spec_file: EXECUTION/task-703-drift-config.md
    subtask_prompt: |
      Adicionar bloco 'drift' ao schema de dare.config.json (BLUEPRINT §3.3). zod: drift { enabled (default false);
      maxOrphanReqs (default 0); maxOrphanCode (default 0); failOnStale (default false);
      ignore: string[] (default ['**/index.ts','**/*.generated.*','**/bin/**']) }. enabled:false => gate não roda.
      Atualizar template dare.config.json. Testes: drift-config.test.ts. Gates: tsc; vitest run drift-config.
      Leia: DARE/EXECUTION/task-703-drift-config.md.

  # ─── Fase 2: comando ──────────────────────────────────────────────────────
  - id: task-704
    title: "dare graph drift — subcomando + exit 7"
    depends_on: [task-701, task-703]
    complexity: MED
    spec_file: EXECUTION/task-704-graph-drift-command.md
    subtask_prompt: |
      Adicionar subcomando 'drift' a 'dare graph' (BLUEPRINT §3.2), junto de owners/impact/trace.
      dare graph drift [--strict] [--format json] [--modules <list>]. Chama detectDrift; saída legível agrupada
      por kind + contagens; --format json imprime DriftReport. Veredito drift-fail quando
      counts.orphan-requirement > maxOrphanReqs OU orphan-code > maxOrphanCode OU (failOnStale && stale>0).
      drift-fail + --strict => process.exit(7) (estende 0/1/3/4/5/6). --modules valida path (path-safety).
      NÃO é comando top-level => sem nova skill (parity de 'graph' já existe). Testes: graph-drift.test.ts.
      Gates: tsc; vitest run graph-drift; lint. Leia: DARE/EXECUTION/task-704-graph-drift-command.md.

