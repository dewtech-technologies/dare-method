tasks:
  # ─── Fase 1: detecção + ingest (rank 0 paralelo) ─────────────────────────
  - id: task-701
    title: "graphrag/drift.ts — detectDrift + tipos"
    depends_on: []
    complexity: MED
    spec_file: EXECUTION/task-701-drift-detect.md
    subtask_prompt: |
      Criar packages/cli/src/graphrag/drift.ts (BLUEPRINT §3.1). Tipos: DriftKind
      'orphan-requirement'|'orphan-code'|'stale'; DriftFinding { kind; nodeId; label; detail };
      DriftReport { findings; counts: Record<DriftKind,number>; staleIndeterminate };
      DriftConfig { enabled; maxOrphanReqs; maxOrphanCode; failOnStale; ignore[] }.
      detectDrift(graph: KnowledgeGraph, cfg): DriftReport — determinístico, SEM LLM:
      - orphan-requirement: queryNodes('requirement') sem getEdges(id,'in') do tipo implements/affects de code_symbol.
      - orphan-code: queryNodes('code_symbol') não casando cfg.ignore e sem getEdges(id,'out') implements p/ requirement.
      - stale: requirement com metadata.contentHash E código ligado cujo hash mudou após o código → finding;
        sem contentHash → incrementar staleIndeterminate (WARN). Reusar getEdges/queryNodes (não SQL custom).
      Testes: graphrag/__tests__/drift.test.ts (os 3 kinds em fixtures; staleIndeterminate). Gates: tsc; vitest run drift.
      Leia: DARE/EXECUTION/task-701-drift-detect.md.

  - id: task-702
    title: "requirement-ingest — contentHash + ingestedAt"
    depends_on: []
    complexity: LOW
    spec_file: EXECUTION/task-702-requirement-hash.md
    subtask_prompt: |
      Modificar packages/cli/src/graphrag/requirement-ingest.ts (BLUEPRINT §3.4). No ingest de cada
      'requirement', gravar metadata.contentHash = sha256(requirementText) (node:crypto) e metadata.ingestedAt.
      Habilita a detecção de stale (task-701) sem custo de runtime no gate. Schema aditivo (não quebra grafos
      existentes). Testes: requirement-hash.test.ts (hash estável; muda com o texto). Gates: tsc; vitest run requirement.
      Leia: DARE/EXECUTION/task-702-requirement-hash.md.

  - id: task-703
