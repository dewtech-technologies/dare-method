# Regra de ouro (BLUEPRINT §1.1, A-7, RS-06): o CLI é 100% DETERMINÍSTICO — orquestra o
#   verificador externo (processo filho via safeSpawn) e LÊ o veredito; NUNCA chama LLM nem
