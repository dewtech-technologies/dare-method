#
# EXTENSÃO, não fork: é um ASPECTO adicional do verification-core (v3.3.0). Pluga no mesmo
#   mecanismo de aspectos do runner.ts, reusa AspectResult/VerificationResult, o registry de
#   adapters como modelo (registry.ts), safeSpawn (exec/safe-spawn.ts) e a política
