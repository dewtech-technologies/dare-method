#   - verification/gates/mutation/adapter.ts (MutationAdapter:21 isAvailable/run + erros tipados) — MOLDE do FormalBackend.
#   - verification/gates/mutation/stryker.ts (parse de JSON nativo do Stryker, :39) — MODELO de parse de veredito.
#   - exec/safe-spawn.ts (safeSpawn:72 argv shell:false; sanitizeEnv:52) — única porta para o solver (RS-03/04/06).
#   - utils/path-safety.ts (assertRelativeSafe) — valida CriticalModuleMarker.file (RS-01).
#   - verification/decay/policy.ts (CONTINUE/FRESH_START/REPLAN/ESCALATE) — abortar/escalar (skill itera o reparo).
#   - verification/telemetry.ts (recordVerification → aresta verified_by) — MODELO de recordFormalProof (RF-09).
